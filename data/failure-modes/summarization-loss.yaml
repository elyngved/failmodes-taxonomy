id: summarization-loss
categoryId: context
name: Summarization Loss
def: |-
  Drops important facts, constraints, uncertainty, or nuance when compressing earlier context into a summary.

  Unlike Summarization Distortion, the retained meaning is not necessarily changed; too much is simply missing. Unlike Context Rot, the degradation is introduced by the summarization step.
updatedAt: "2026-06-13T09:00:00-04:00"

searchPhrases:
  - summary dropped key facts
  - lost detail in the summary
  - summary missed important info
  - compression lost nuance
examples:
  - kind: fail
    label: Constraint dropped at compaction
    text: A hard limit stated early in the session doesn't survive context compaction, and the model's later work violates it without the model ever contradicting anything it can still see.
    quote: |-
      User: Keep the export under 10 MB — the upload endpoint rejects anything bigger.
      [… long session; context compacted to "user is building a CSV export feature" …]
      Assistant: I've embedded the full-resolution images in the export so recipients don't need separate downloads.
  - kind: warn
    label: Qualifiers stripped
    text: The facts survive compression but their conditions do not — a summary turns "only if the client signs by March" into a flat commitment.
    quote: |-
      User: Legal said we can use the new logo, but only if the client signs the licensing addendum by March.
      [… session summarized: "Legal approved use of the new logo" …]
      Assistant: Since legal has approved the new logo, I've added it to all the launch materials.
  - kind: ok
    label: Constraint survives compaction
    text: The summarization step preserves the operative limit, and post-compaction work still honors it.
    quote: |-
      User: Keep the export under 10 MB — the upload endpoint rejects anything bigger.
      [… long session; compacted summary retains "hard limit: export ≤ 10 MB" …]
      Assistant: Embedding images would blow past the 10 MB cap, so I've linked thumbnails instead and the export sits at 4 MB.
why:
  - Summarization is lossy by definition, but the model decides what to drop using general salience learned from training data, not the task's actual stakes. A constraint that is critical to one user reads as a minor detail in most training examples.
  - >-
    Summarization training and evaluation have historically prioritized fluency and topical coverage over completeness. Human and automatic ratings correlate weakly with whether specific facts survive compression (Fabbri et al., 2021, "SummEval: Re-evaluating Summarization Evaluation").
  - Hedges, uncertainty, and qualifiers are statistically incidental in training summaries, so compression tends to strip "probably" and "only if" clauses first, silently converting conditional statements into confident ones.
  - In agent and chat systems, summarization runs before the model knows which details the future task will need. Relevance must be guessed in advance, and wrong guesses surface only later as missing facts.
detection:
  - icon: 📏
    heading: Constraint preservation checks
    body: Extract constraints, qualifiers, and hard limits from the pre-compression context and check that each survives into the summary. Run it at the compaction step itself — a dropped "only if" clause or size cap is detectable the moment it is lost, before any downstream work violates it.
  - icon: ❓
    heading: QA-based consistency checks
    body: Generate questions from the original context and try to answer them from the summary alone. Questions that become unanswerable map directly to dropped content, and weighting the question set toward constraints and conditions targets the losses that actually cause downstream failures.
  - icon: 🧪
    heading: Golden-set evals
    body: Maintain long sessions seeded with known critical details, run them through the real compaction pipeline, and probe post-compaction behavior. Test multiple rounds of summarization, since details that barely survive one pass are often dropped by the next.

mitigation:
  - icon: 📝
    heading: Instruction constraints
    body: Make constraints, hard limits, and "only if" qualifiers mandatory survivors of the compaction prompt — carried verbatim into a dedicated section of the summary regardless of how incidental they look — since the model's learned salience reads a user's critical limit as a minor detail.
  - icon: 📏
    heading: Constraint preservation checks
    body: Run the survival check as a gate at the compaction step itself — extract constraints and qualifiers from the pre-compression context, verify each appears in the summary, and restore what's missing before the original drops out of the window and the loss becomes unrecoverable.
  - icon: 🧷
    heading: Source-anchored compression
    body: Keep the original context retrievable after compaction and re-summarize from it rather than from prior summaries — each summary-of-a-summary re-applies the same salience filter, so a detail that barely survived one pass is dropped by the next.

related:
  - id: summarization-distortion
  - id: context-rot
  - id: concision-failure
