id: chunk-boundary-failure
categoryId: retrieval
name: Chunk Boundary Failure
def: |-
  Misses, fragments, or misinterprets evidence because relevant information was split across retrieval chunks or separated from needed context.

  Unlike Partial Retrieval, this identifies chunking as the mechanism. Unlike Context Dilution, the issue happens before or during retrieval packaging rather than after too much context reaches the model.
searchPhrases:
  - answer cut off between chunks
  - split the document badly
  - missed info across chunks
  - chunking broke the context

why:
  - Most pipelines split documents by token count, not meaning. Fixed-size splitting is cheap and predictable, but it cuts through sentences, tables, arguments, and definitions wherever the length limit happens to fall.
  - Chunks are embedded and ranked in isolation. A passage whose meaning depends on a heading, an earlier definition, or an antecedent two paragraphs back embeds poorly and retrieves poorly, because the embedding never saw the context that made it relevant (Anthropic, 2024, "Introducing Contextual Retrieval").
  - Documents carry meaning through structure — section nesting, table headers, footnotes, cross-references — and common text extraction flattens that structure before splitting, so the chunker cannot respect boundaries it can no longer see.
  - Pronouns and elided references stop resolving once text is cut. A retrieved chunk saying "this approach fails in production" is useless or misleading when the approach was named in the previous chunk.

examples:
  - kind: fail
    label: Orphaned antecedent
    text: The retrieved chunk's "this configuration" was named in the previous chunk, which didn't retrieve. The model resolves the dangling reference to the wrong thing.
    quote: |-
      User: Is connection pooling safe to enable in production?
      [… retrieved chunk begins: "However, this configuration fails under production load and should be avoided." The configuration being warned against — an unrelated cache setting — was named in the preceding, unretrieved chunk …]
      Assistant: No — the docs explicitly warn that connection pooling fails under production load.
  - kind: fail
    label: Table split from its header
    text: A fixed-size split lands mid-table, so the retrieved rows arrive without the header row that gives the numbers meaning, and the model maps values to the wrong columns.
    quote: |-
      User: What's the rate limit on the Enterprise tier?
      [… chunk contains table rows "Pro | 1,000 | 60" and "Enterprise | 10,000 | 600", but the header row landed in the previous chunk …]
      Assistant: The Enterprise tier is limited to 600 requests per minute.
      [… 600 is the burst allowance column; the rate limit is 10,000 …]
  - kind: warn
    label: Mid-sentence fragment answered anyway
    text: The chunk begins mid-sentence and the model builds its answer on the fragment without flagging that the evidence is visibly truncated.
    quote: |-
      User: When can customers get a refund?
      [… retrieved chunk begins mid-sentence: "…except in these cases, refunds are processed within 14 days." …]
      Assistant: Refunds are processed within 14 days.
  - kind: ok
    label: Fragment recognized, context refetched
    text: The model notices the evidence is cut off where it matters and pulls the surrounding context before answering.
    quote: |-
      User: When can customers get a refund?
      Assistant: The passage I retrieved starts mid-sentence — it references exception cases defined just before the cut. Let me fetch the surrounding section.
      Tool: fetch adjacent chunks — exceptions are digital goods and custom orders
      Assistant: Refunds are processed within 14 days, except for digital goods and custom orders, which are non-refundable.

detection:
  - icon: 🔍
    heading: Corpus chunk auditing
    body: Scan the index itself for boundary damage — chunks that begin mid-sentence, table rows separated from their header, dangling pronouns and "this configuration" references whose antecedent fell in the previous chunk. The failure is visible in the corpus before any query is run.
  - icon: ⚖️
    heading: LLM-as-judge evaluation
    body: Run a judge over the retrieved set asking whether each chunk is self-contained enough to support the claims built on it — flagging answers grounded in visibly truncated evidence, like a refund rule quoted from a fragment that starts at "…except in these cases."
  - icon: 🧪
    heading: Golden-set evals
    body: Maintain questions whose evidence is known to straddle split points — values inside long tables, definitions referenced sections later, exception lists that cross pages — and rerun them whenever chunk size, overlap, or the splitting strategy changes.

mitigation:
  - icon: 🧱
    heading: Structure-aware chunking
    body: Split on the document's own boundaries — sections, paragraphs, sentence ends — and keep atomic units intact, so tables travel with their header rows and exception lists stay attached to the rules they qualify, instead of cutting wherever the token limit falls.
  - icon: 🧾
    heading: Contextual chunk enrichment
    body: Prepend each chunk with the context that makes it self-contained — document title, section path, the antecedent of its references — before embedding (Anthropic, 2024, "Introducing Contextual Retrieval"). "This configuration fails under load" only retrieves and reads correctly when the chunk says which configuration.
  - icon: 🔁
    heading: Adjacent-chunk expansion
    body: At read time, fetch the neighbors of any retrieved chunk that is visibly truncated — starts mid-sentence, opens with a dangling reference, contains headerless table rows — so the model answers from the restored passage rather than the fragment.

related:
  - id: partial-retrieval
  - id: retrieval-miss
  - id: context-dilution
